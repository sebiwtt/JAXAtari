# PQN continual RL experiment — object-centric observations (Pong, paddle-height study)
#
# Usage:
#   python pqn_agent.py alg=pqn_continual_object CONTINUAL_EXPERIMENT=true
#
# To skip base training and resume from a saved checkpoint:
#   python pqn_agent.py alg=pqn_continual_object CONTINUAL_EXPERIMENT=true \
#       alg.LOAD_BASE_CHECKPOINT=./models/Pong/pqn_Pong_C0.safetensors

ALG_NAME: "pqn"

# --- Base training budget (T0) ---
TOTAL_TIMESTEPS: 5e7
TOTAL_TIMESTEPS_DECAY: 5e7

# --- Parallel env / update settings ---
NUM_ENVS: 1024
NUM_STEPS: 128           # NUM_STEPS * NUM_ENVS must be divisible by NUM_MINIBATCHES
NUM_EPOCHS: 5
NUM_MINIBATCHES: 128     # 1024 * 128 / 128 = 1024 per minibatch

# --- Exploration ---
EPS_START: 1.0
EPS_FINISH: 0.001
EPS_DECAY: 0.1           # fraction of NUM_UPDATES_DECAY over which eps decays

# --- Optimiser ---
LR: 1.0e-4
MAX_GRAD_NORM: 10
LR_LINEAR_DECAY: False

# --- RL ---
GAMMA: 0.99
LAMBDA: 0.65
NORM_TYPE: "layer_norm"

# --- Environment ---
ENV_NAME: "Pong"
ENV_KWARGS: {}
OBJECT_CENTRIC: True

# --- In-training evaluation (disabled by default to save compile time) ---
TEST_DURING_TRAINING: False
TEST_INTERVAL: 0.1       # fraction of NUM_UPDATES between test rollouts
TEST_NUM_ENVS: 128
TEST_NUM_STEPS: 10000
EPS_TEST: 0.0            # 0 = greedy evaluation policy
RECORD_VIDEO: False
RECORD_FINAL_VIDEO: False

# ======================================================================
# Continual RL settings
# ======================================================================

# Finetuning budget for each Tk phase (defaults to TOTAL_TIMESTEPS if omitted).
# Reduce this to run faster exploratory experiments.
FINETUNE_TIMESTEPS: 5e5

# Number of full episodes used by evaluate() for each retention measurement.
EVAL_NUM_EPISODES: 20

# Path to a pre-trained C0 checkpoint (.safetensors).
# Set to null to train C0 from scratch in Step 1.
# The matching batch-stats file is expected at the same path with _bs suffix.
LOAD_BASE_CHECKPOINT: null

# Ordered list of mod strings — one per shift level (T1 … TN).
# T0 is always the unmodified base game (empty mod list).
# Replace these placeholders with the exact strings your mods are registered under.
CONTINUAL_MODS:
  - "small_paddle"  

