# Realistic config for the continual RL experiment on Pong (object-centric).
# Based on pqn_short_eval_run_object.yaml.
#
# Run with:
#   python pqn_agent_continual.py --config-name=config_continual

# ── meta ──────────────────────────────────────────────────────────────────────
NUM_SEEDS: 1
SEED: 0
HYP_TUNE: False
CONTINUAL_EXPERIMENT: True

# ── wandb ─────────────────────────────────────────────────────────────────────
WANDB_MODE: "online"
ENTITY: ""
PROJECT: "jaxatari_continual"
NAME: "pqn_pong_oc_continual"

# ── checkpointing ─────────────────────────────────────────────────────────────
SAVE_PATH: "./models"
# Uncomment to skip base training and load a previously saved C0:
# LOAD_BASE_CHECKPOINT: "./models/Pong/pqn_pong_oc_seed0_C0.safetensors"

# ── alg ───────────────────────────────────────────────────────────────────────
alg:
  WANDB_LOG_ALL_SEEDS: False

  ALG_NAME: "pqn"
  HIDDEN_SIZE: 256
  NUM_LAYERS: 3

  # Base training on T0: 2e8 steps  (~1526 updates of 131 072 steps each)
  TOTAL_TIMESTEPS: 2e8
  TOTAL_TIMESTEPS_DECAY: 2e8

  # Finetuning per task: 2e7 steps  (~152 updates, 10% of base training)
  # Enough to adapt to the modified paddle without fully overwriting T0 knowledge.
  FINETUNE_TIMESTEPS: 2e7

  NUM_ENVS: 1024
  NUM_STEPS: 128          # update size = 1024 × 128 = 131 072; divisible by NUM_MINIBATCHES
  NUM_EPOCHS: 3
  NUM_MINIBATCHES: 64

  EPS_START: 1.0
  EPS_FINISH: 0.001
  EPS_DECAY: 0.1
  EPS_TEST: 0.0           # greedy evaluation

  NORM_TYPE: "layer_norm"
  LR: 1e-3
  MAX_GRAD_NORM: 10
  LR_LINEAR_DECAY: False
  GAMMA: 0.99
  LAMBDA: 0.65

  # ── environment ──────────────────────────────────────────────────────────────
  ENV_NAME: "Pong"
  ENV_KWARGS: {}
  OBJECT_CENTRIC: True
  TRAIN_MODS: null
  EVAL_MODS: null

  # ── test / video ─────────────────────────────────────────────────────────────
  TEST_DURING_TRAINING: False
  TEST_INTERVAL: 1.0
  TEST_NUM_ENVS: 128
  TEST_NUM_STEPS: 10000
  RECORD_VIDEO: False
  RECORD_FINAL_VIDEO: False   # not used in continual_experiment()
  VIDEO_MAX_STEPS: 1500       # max steps per episode in evaluate()

  # ── continual experiment ──────────────────────────────────────────────────────
  # Four progressively harder paddle reductions — finetune independently from C0.
  CONTINUAL_MODS:
    - "paddle_14"
    - "paddle_12"
    - "paddle_10"
    - "paddle_8"
    - "paddle_6"

  EVAL_NUM_EPISODES: 5
  LOAD_BASE_CHECKPOINT: null
